<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="profile-mobile-view">
        <main class="content-wrapper">
            
            <section class="profile-card">
                <div class="profile-flex-container">
                    <img class="profile-picture" src="assets/images/profile/profile-picture.png" alt="Profile">
                    <div class="profile-info">
                        <div class="name-row">
                            <h1>Jux</h1>
                            <div class="action-icons">
                                <img src="assets/icons/profile/edit-icon.png" alt="edit">
                                <img src="assets/icons/profile/upload-icon.png" alt="share">
                            </div>
                        </div>
                        <div class="stats-row">
                            <p><span>3</span> followers</p>
                            <span class="divider-dot"></span>
                            <p><span>30</span> following</p>
                        </div>
                        <p class="user-id">31z6y5ynbcaogtsjzzpinxeue6xu</p>
                    </div>
                </div>
            </section>

            <section class="friends-card">
                <div class="card-header">
                    <h2>Friends</h2>
                    <img src="assets/icons/profile/add-friends-icon.png" alt="add">
                </div>
                <ul class="friends-list">
                    <li>
                        <img src="assets/images/profile/friend-1.png" alt="">
                        <div class="friend-details">
                            <span class="friend-name">FriendlyMusicListener</span>
                            <div class="music-info">
                                <img src="assets/icons/profile/voicewaves-icon.png" alt="">
                                <p>Goosebumps • Travis Scott</p>
                            </div>
                        </div>
                    </li>
                    <li>
                        <img src="assets/images/profile/friend-2.png" alt="">
                        <div class="friend-details">
                            <span class="friend-name">AverageMusicEnjoyer</span>
                            <div class="music-info">
                                <img src="assets/icons/profile/voicewaves-icon.png" alt="">
                                <p>Get Lucky • Daft Punk</p>
                            </div>
                        </div>
                    </li>
                </ul>
            </section>

            <section class="plan-card">
                <div class="plan-header">
                    <img src="assets/icons/profile/spotify-icon.png" alt="spotify">
                    <p>Current Plan</p>
                </div> 
                <h3 class="plan-title">Premium - Individual</h3>
                <p class="plan-price">$10.99 / month</p>
            </section>

            <section class="settings-card">
                <div class="setting-item">
                    <img src="assets/icons/profile/clock-icon.png" alt="">
                    <p>Listening history</p>
                    <img class="arrow" src="assets/icons/profile/arrow-right-icon.png" alt="">
                </div>
                <div class="setting-item">
                    <img src="assets/icons/profile/settings-icon.png" alt="">
                    <p>Settings and privacy</p>
                    <img class="arrow" src="assets/icons/profile/arrow-right-icon.png" alt="">
                </div>
                <div class="setting-item">
                    <img src="assets/icons/profile/bell-icon.png" alt="">
                    <p>What’s new</p>
                    <img class="arrow" src="assets/icons/profile/arrow-right-icon.png" alt="">
                </div>
            </section>

        </main>
    </div>
</body>
</html>
